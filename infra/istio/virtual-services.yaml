apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: nbt-services
  namespace: default
spec:
  hosts:
    - "*"
  gateways:
    - nbt-gateway
  http:
    # Route for Auth Service
    - match:
        - uri:
            prefix: /com.nbt.proto.auth.AuthService/
      route:
        - destination:
            host: auth-service
            port:
              number: 9091

    # Route for User Service
    - match:
        - uri:
            prefix: /com.nbt.proto.user.UserService/
      route:
        - destination:
            host: user-service
            port:
              number: 9090

    # Route for Catalog Service
    - match:
        - uri:
            prefix: /com.nbt.proto.catalog.CatalogService/
      route:
        - destination:
            host: catalog-service
            port:
              number: 9092

    # Route for Subscription Service
    - match:
        - uri:
            prefix: /com.nbt.proto.subscription.SubscriptionService/
      route:
        - destination:
            host: subscription-service
            port:
              number: 9093

    # Route for Billing Service
    - match:
        - uri:
            prefix: /com.nbt.proto.billing.BillingService/
      route:
        - destination:
            host: billing-service
            port:
              number: 9094
